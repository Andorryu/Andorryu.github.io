<!DOCTYPE html>
<html>
    <head>
        <script src="initialization.js"></script>
        <link rel="stylesheet", href="style.css">
    </head>
    <body>
        <nav></nav>
        <div class="centered-img-frame">
            <img id="house">
        </div>
        <script>
            function randImg(img_id, img_folder, min, max)
            {
                // each img file must have a number for a name
                img_select = Math.floor(Math.random() * max + min);
                img = document.getElementById(img_id);
                img.setAttribute("src", "img/" + img_folder + "/" + img_select + ".jpg");
            }
            randImg("house", "home", 1, 7);
        </script>
    </body>
</html>
